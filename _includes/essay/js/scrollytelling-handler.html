<script>
// Initialize collection metadata lookup
window.collectionMetadata = {};
{% assign items = site.data[site.metadata] %}
{% for item in items %}
window.collectionMetadata['{{ item.objectid }}'] = {
  objectid: '{{ item.objectid }}',
  title: {{ item.title | jsonify }},
  image_citation: {{ item.image_citation | jsonify }},
  object_location: {% if item.object_location %}'{{ site.baseurl }}{{ item.object_location }}'{% else %}null{% endif %},
  image_small: {% if item.image_small %}'{{ site.baseurl }}{{ item.image_small }}'{% else %}null{% endif %},
  image_thumb: {% if item.image_thumb %}'{{ site.baseurl }}{{ item.image_thumb }}'{% else %}null{% endif %},
  image_alt_text: {{ item.image_alt_text | jsonify }}
};
{% endfor %}

window.citationData = {};
{% assign citations = site.data.citation %}
{% for citation in citations %}
window.citationData['{{ citation.id }}'] = {
  id: '{{ citation.id }}',
  text: {{ citation.text | jsonify }}
};
{% endfor %}

class ScrollyTelling {
  constructor() {
    this.triggers = [];
    this.imageSegments = [];
    this.footnotes = [];

    this.activeImageId            = null;
    this.currentCitation          = null;
    this.loadedRange              = { start: -1, end: -1 };
    this.activeChapterIndex       = -1;
    this.isLoading                = false;
    this.isTransitioning          = false;
    this.isRestoring              = false;
    this.transitionPromise        = null;
    this.layoutObserverTimeout    = null;
    this.layoutObserverPaused     = false;
    this.pendingLayout            = null;
    this.scrollAdjustmentCooldown = false;
    this.lastScrollY              = 0;
    this.maxScrollY               = 0;
    this.separatorIcons           = [];
    this.chapterEndFaded          = false;
    this.activeFullLayoutImageId  = null;

    // ── INTER_VIS: instances keyed by trigger block element
    this.intervisInstances = new Map();

    this.textColumn         = document.getElementById('scrolly-text');
    this.imageContainer     = document.getElementById('scrolly-image-container');
    this.scrollyContainer   = document.getElementById('scrolly-container');
    this.textContentEl      = document.querySelector('.scrolly-text-content');
    this.loadingIndicatorEl = document.getElementById('chapter-loading-indicator');

    this.citationColumnEl  = null;
    this.citationDisplayEl = null;

    this.tocSidebar = document.getElementById('scrolly-toc-sidebar');
    this.tocList    = document.getElementById('scrolly-toc-list');

    this.allEssays    = window.allEssays || [];
    this.currentLayout = this.scrollyContainer
      ? this.scrollyContainer.dataset.layout
      : 'right';

    this.init();
  }

  init() {
    if (!this.textColumn || !this.allEssays.length || !this.textContentEl) return;

    history.scrollRestoration = 'manual';
    window.addEventListener('pagehide', () => this._saveScrollState());

    this.citationColumnEl = document.getElementById('scrolly-citation-column');
    if (!this.citationColumnEl && this.scrollyContainer) {
      this.citationColumnEl = document.createElement('div');
      this.citationColumnEl.id        = 'scrolly-citation-column';
      this.citationColumnEl.className = 'scrolly-citation-column';
      this.citationColumnEl.innerHTML =
        '<div class="scrolly-citation-display" id="scrolly-citation-display"></div>';
      this.scrollyContainer.appendChild(this.citationColumnEl);
    }
    this.citationDisplayEl = document.getElementById('scrolly-citation-display');

    const currentPath = this.normalizeUrl(this.textContentEl.dataset.chapterPath);
    const startIdx    = this.allEssays.findIndex(
      e => this.normalizeUrl(e.url) === currentPath
    );
    const idx = startIdx === -1 ? 0 : startIdx;

    this.loadedRange.start  = idx;
    this.loadedRange.end    = idx;
    this.activeChapterIndex = idx;

    this.processNewBlock(this.textContentEl);
    this.setupLayoutObserver();
    this.setupThemeObserver();
    this.updateTheme();

    document.querySelectorAll('.chapter-separator').forEach(sep => {
      this.observeSeparator(sep);
    });

    window.addEventListener('scroll', () => this.handleScroll(), { passive: true });

    const navEntries = performance.getEntriesByType('navigation');
    if (navEntries.length && navEntries[0].type === 'back_forward') {
      this._restoreScrollState();
    } else {
      setTimeout(() => this.handleScroll(), 100);
    }

    this.populateTocSections(this.textContentEl);
    this.updateTocActiveChapter(idx);
    this.setupLightbox();
    this._suppressBackToTop();
  }

  // ── STATE SAVE / RESTORE ────────────────────────────────────────────────

  _saveScrollState() {
    try {
      sessionStorage.setItem('scrolly_state', JSON.stringify({
        y: window.scrollY, start: this.loadedRange.start,
        end: this.loadedRange.end, path: location.pathname
      }));
    } catch (e) {}
  }

  async _restoreScrollState() {
    let state = null;
    try { const raw = sessionStorage.getItem('scrolly_state'); state = raw ? JSON.parse(raw) : null; }
    catch (e) {}

    if (!state || this.normalizeUrl(state.path) !== this.normalizeUrl(location.pathname)) {
      setTimeout(() => this.handleScroll(), 100); return;
    }

    this.isRestoring = true; this.scrollAdjustmentCooldown = true; this.layoutObserverPaused = true;

    try {
      while (this.loadedRange.end < state.end) {
        if (this.isLoading) { await this._wait(150); continue; }
        await this.loadChapter('next'); await this._wait(80);
      }
      while (this.loadedRange.start > state.start) {
        if (this.isLoading) { await this._wait(150); continue; }
        await this.loadChapter('prev'); await this._wait(80);
      }
      await this._wait(250);
      window.scrollTo({ top: state.y, behavior: 'instant' });
      await this._wait(350);
      sessionStorage.removeItem('scrolly_state');
    } catch (err) {
      console.error('ScrollyTelling: state restore failed', err);
    } finally {
      this.isRestoring = false; this.scrollAdjustmentCooldown = false;
      this.layoutObserverPaused = false; this.handleScroll();
    }
  }

  // ── BLOCK PROCESSING ────────────────────────────────────────────────────

  processNewBlock(block) {
    const layout = block.dataset.layout || 'right';

    // ── INTER_VIS: delegate entirely; skip chapter processing
    if (layout === 'inter_vis') {
      this.setupInterVisBlock(block);
      this.populateTocSections(block);
      return;
    }

    this.cleanLayoutArtifacts(block);
    this.convertFootnotesToSuperscript(block);
    this.parseTriggers(block, layout);
    this.processFootnotes(block);
    this.observeBlock(block);

    if (layout === 'full') block.style.paddingTop = '30vh';

    this.currentCitation = null;
    if (this.citationDisplayEl) this.citationDisplayEl.classList.remove('visible');
    if (layout === 'full') this.hydrateInlineImages(block);

    this.populateTocSections(block);
    if (this._wireLightboxOnInlineImages) this._wireLightboxOnInlineImages();
  }

  // ── INTER_VIS: setup visualization frame in the image column ────────────
  // For standalone page: frame already exists in .scrolly-image-frame as a
  //   sibling of #scrolly-image-container, identified by data-intervis-for.
  // For infinite-scroll injection: create frame and append to .scrolly-image-frame.
  setupInterVisBlock(block) {
    if (this.intervisInstances.has(block)) return;

    const imageFrame = document.querySelector('#scrolly-image .scrolly-image-frame');
    if (!imageFrame) { console.warn('InterVis: .scrolly-image-frame not found'); return; }

    const chapterPath = block.dataset.chapterPath || '';
    let frame = imageFrame.querySelector(
      `.intervis-frame[data-intervis-for="${chapterPath}"]`
    );
    let layerContainer, stickyTitle, hintEl, descriptionEl;

    if (frame) {
      // Standalone page: frame already correctly placed by inter_vis.html template
      layerContainer = frame.querySelector('.intervis-layer-container');
      stickyTitle    = frame.querySelector('.intervis-sticky-title');
      hintEl         = frame.querySelector('.intervis-scroll-hint');
      descriptionEl  = frame.querySelector('.intervis-description');
    } else {
      // Infinite-scroll: build frame as sibling of #scrolly-image-container
      frame = document.createElement('div');
      frame.className = 'intervis-frame';
      frame.dataset.intervisFor = chapterPath;

      layerContainer = document.createElement('div');
      layerContainer.className = 'intervis-layer-container';
      frame.appendChild(layerContainer);

      stickyTitle = document.createElement('div');
      stickyTitle.className   = 'intervis-sticky-title';
      stickyTitle.textContent = block.dataset.chapterTitle || block.dataset.tocTitle || '';
      frame.appendChild(stickyTitle);

      hintEl = document.createElement('div');
      hintEl.className = 'intervis-scroll-hint';
      hintEl.setAttribute('aria-hidden', 'true');
      hintEl.innerHTML = 'scroll<span class="scroll-hint-arrow">&#x2193;</span>';
      frame.appendChild(hintEl);

      // Append to .scrolly-image-frame (NOT inside #scrolly-image-container)
      imageFrame.appendChild(frame);
    }

    // ── DESCRIPTION ELEMENT ─────────────────────────────────────────────────
    // The description must be a direct child of document.body — NOT inside
    // .intervis-frame. The frame has `opacity: 0` (transitioning to 1 via
    // .is-active), which creates a CSS stacking context. All descendants —
    // including position:fixed ones — are rendered within that stacking
    // context, so their effective visual opacity is frame_opacity × their_own.
    // Appending to body bypasses this entirely.
    //
    // Any pre-existing description in the frame HTML (from inter_vis.html)
    // is moved to body here. Infinite-scroll builds fresh on body directly.
    let existingInFrame = frame.querySelector('.intervis-description');
    if (existingInFrame) {
      existingInFrame.remove();  // remove from frame; we'll recreate on body
    }

    descriptionEl = document.querySelector(
      `.intervis-description[data-intervis-for="${chapterPath}"]`
    );
    if (!descriptionEl) {
      descriptionEl = document.createElement('div');
      descriptionEl.className = 'intervis-description';
      descriptionEl.dataset.intervisFor = chapterPath;
      document.body.appendChild(descriptionEl);
    }

    if (typeof InterVis === 'function') {
      const iv = new InterVis(block, layerContainer, frame, stickyTitle, hintEl, descriptionEl);
      this.intervisInstances.set(block, iv);
    } else {
      console.warn('InterVis class not found. Include intervis-handler.html before scrollytelling-handler.html.');
    }

    this.observeBlock(block);
  }

  // ── INTER_VIS: proxy scroll to all active instances
  handleInterVisScroll(triggerThreshold) {
    this.intervisInstances.forEach(iv => iv.handleScroll(triggerThreshold));
  }

  cleanLayoutArtifacts(container) {
    container.querySelectorAll('br').forEach(br => br.remove());
    // Do NOT zero trigger heights for inter_vis (CSS gives them 65vh)
    if (container.dataset.layout !== 'full' && container.dataset.layout !== 'inter_vis') {
      container.querySelectorAll('[data-trigger-type]').forEach(t => {
        Object.assign(t.style, {
          display: 'block', height: '0px', width: '0px',
          margin: '0px', padding: '0px', overflow: 'hidden', visibility: 'hidden'
        });
      });
    }
  }

  hydrateInlineImages(container) {
    container.querySelectorAll('[data-trigger-type="image"]').forEach(trigger => {
      const objId = trigger.dataset.triggerId;
      const meta  = window.collectionMetadata[objId];
      if (!meta) return;

      let img = trigger.querySelector('img');
      let caption = trigger.querySelector('.text-muted');

      if (img && (!img.complete || img.naturalHeight === 0)) { img.remove(); img = null; }

      if (!img) {
        img = document.createElement('img');
        img.src = meta.object_location || meta.image_small;
        img.alt = meta.image_alt_text || meta.title;
        img.className = 'img-fluid d-block mx-auto mb-2';
        img.style.maxWidth = '100%';
        Object.assign(trigger.style, {
          position: 'relative', display: 'block', visibility: 'visible',
          height: 'auto', width: '100%', margin: '6rem 0', opacity: '1', overflow: 'visible'
        });
        trigger.appendChild(img);
      }

      if (meta.image_citation && !caption) {
        caption = document.createElement('div');
        caption.className = 'text-muted small text-center mt-1 mb-4 mx-auto';
        caption.innerHTML = this.formatCitation(meta.image_citation);
        trigger.appendChild(caption);
      }
    });
  }

  // ── TOC MANAGEMENT ──────────────────────────────────────────────────────

  populateTocSections(block) {
    if (!this.tocList) return;
    if (block.dataset.layout === 'inter_vis') return;

    const chapterUrl = block.dataset.chapterPath;
    if (!chapterUrl) return;

    const chapterIdx = this.allEssays.findIndex(
      e => this.normalizeUrl(e.url) === this.normalizeUrl(chapterUrl)
    );
    if (chapterIdx === -1) return;

    const essay = this.allEssays[chapterIdx];
    if (essay.layout === 'inter_vis') return;

    const sectionUl = document.getElementById(`toc-sections-${essay.order}`);
    if (!sectionUl || sectionUl.dataset.populated === 'true') return;

    const hrs = block.querySelectorAll('hr');
    if (!hrs.length) return;

    const headerH = () => parseFloat(
      getComputedStyle(document.documentElement).getPropertyValue('--scrolly-header-h')
    ) || 52;

    const fragment = document.createDocumentFragment();
    hrs.forEach((hr, i) => {
      if (!hr.id) hr.id = `section-break-${essay.order}-${i + 1}`;
      const li = document.createElement('li');
      const a  = document.createElement('a');
      a.href = `#${hr.id}`; a.className = 'toc-section-rule';
      a.setAttribute('aria-label', `Section break ${i + 1} of chapter ${essay.order}`);
      a.dataset.sectionId = hr.id;
      a.addEventListener('click', e => {
        e.preventDefault();
        const target = document.getElementById(hr.id);
        if (target) {
          const y = target.getBoundingClientRect().top + window.scrollY - headerH() - 32;
          window.scrollTo({ top: y, behavior: 'smooth' });
        }
      });
      li.appendChild(a); fragment.appendChild(li);
    });

    sectionUl.appendChild(fragment);
    sectionUl.dataset.populated = 'true';
    sectionUl.style.display = '';
  }

  updateTocActiveChapter(chapterIdx) {
    if (!this.tocList) return;
    const essay = this.allEssays[chapterIdx];
    if (!essay) return;

    const targetUrl = this.normalizeUrl(essay.url);

    this.tocList.querySelectorAll('.scrolly-toc-link').forEach(link => {
      link.classList.toggle('toc-active',
        this.normalizeUrl(link.getAttribute('href')) === targetUrl);
    });

    this.tocList.querySelectorAll('.toc-section-list').forEach(ul => {
      const ulUrl = this.normalizeUrl(ul.dataset.tocChapterUrl || '');
      ul.style.display = (ulUrl === targetUrl && ul.children.length > 0) ? '' : 'none';
    });
  }

  updateTocSectionActive(triggerThreshold) {
    const rules = this.tocList ? this.tocList.querySelectorAll('.toc-section-rule') : [];
    if (!rules.length) return;

    let activeRule = null;
    rules.forEach(rule => {
      const id = rule.dataset.sectionId;
      const target = id ? document.getElementById(id) : null;
      if (!target) return;
      if (target.getBoundingClientRect().top <= triggerThreshold) activeRule = rule;
    });
    rules.forEach(rule => rule.classList.toggle('toc-section-active', rule === activeRule));
  }

  // ── SCROLL HANDLING ─────────────────────────────────────────────────────

  handleScroll() {
    if (this.isTransitioning || this.isRestoring) return;

    if (window.scrollY > this.maxScrollY) this.maxScrollY = window.scrollY;

    const triggerThreshold = window.innerHeight / 2;

    const activeEssay    = this.allEssays[this.activeChapterIndex];
    const inIntervis     = activeEssay?.layout === 'inter_vis';
    const wasInIntervis  = this._wasInIntervis || false;
    this._wasInIntervis  = inIntervis;

    let newActiveId = null, lastStartParams = null;

    for (const trigger of this.triggers) {
      if (trigger.parentLayout === 'full' || trigger.parentLayout === 'inter_vis') continue;
      if (trigger.type !== 'image') continue;

      const rect     = trigger.element.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;

      if (midpoint < triggerThreshold) {
        if (trigger.action === 'start') {
          newActiveId = trigger.id; lastStartParams = trigger.params;
        } else if (trigger.action === 'end') {
          newActiveId = null; lastStartParams = null;
        }
      }
    }

    // Suppress chapter image logic during inter_vis sections
    if (this.currentLayout !== 'full' && !inIntervis) {
      // Exiting inter_vis (backward scroll): reset activeImageId so the image
      // is forced to re-evaluate even if newActiveId matches the stale value.
      // Without this reset, updateImageVisibility never fires because
      // newActiveId === this.activeImageId (nothing changed it during inter_vis).
      if (wasInIntervis) {
        this.activeImageId = null;
      }
      if (newActiveId !== this.activeImageId) {
        this.updateImageVisibility(newActiveId, lastStartParams);
      }
      this.renderAnimations(triggerThreshold);
    } else if (this.currentLayout === 'full') {
      this.handleFullLayoutImageCitations(triggerThreshold);
    }

    this.handleCitations(triggerThreshold);
    this.handleSeparatorFade(triggerThreshold);
    this.updateTocSectionActive(triggerThreshold);

    // Proxy scroll to all active InterVis instances
    this.handleInterVisScroll(triggerThreshold);

    this.handleInfiniteScroll();
  }

  handleFullLayoutImageCitations(triggerThreshold) {
    const triggers = document.querySelectorAll(
      '.chapter-content-block[data-layout="full"] [data-trigger-type="image"]'
    );
    let bestId = null, bestTop = -Infinity;
    triggers.forEach(trigger => {
      const objId = trigger.dataset.triggerId; if (!objId) return;
      const rect = trigger.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.top > bestTop) { bestTop = rect.top; bestId = objId; }
    });
    if (bestId !== this.activeFullLayoutImageId) {
      this.activeFullLayoutImageId = bestId;
      this.updateFooterImageCitation(bestId);
    }
  }

  updateImageVisibility(newId, params) {
    if (this.currentLayout === 'full') return;

    this.activeImageId = newId;

    if (newId && !this.imageContainer.querySelector(`img[data-objectid="${newId}"]`)) {
      this.createImageElement(newId, params);
    }

    this.imageContainer.querySelectorAll('img').forEach(img => {
      const active      = img.dataset.objectid === newId;
      img.style.opacity = active ? '1' : '0';
      img.style.zIndex  = active ? '2' : '1';
    });

    this.updateFooterImageCitation(newId);
  }

  _figureLabel(objectid) {
    const match = objectid ? /(\d+)$/.exec(objectid) : null;
    return match ? `<i>Figure ${parseInt(match[1], 10)}:</i> ` : '';
  }

  updateFooterImageCitation(objectid) {
    const desktopContent = document.getElementById('scrolly-image-citation-content');
    const desktopWrapper = document.getElementById('scrolly-image-citation-footer');
    const desktopLink    = document.getElementById('scrolly-image-view-link');
    const mobileTitleEl  = document.getElementById('scrolly-mobile-image-title');
    const mobileViewLink = document.getElementById('scrolly-mobile-view-link');

    if (objectid && window.collectionMetadata[objectid]) {
      const meta    = window.collectionMetadata[objectid];
      const itemUrl = `{{ site.baseurl }}/items/${objectid}.html`;
      if (desktopContent) {
        desktopContent.innerHTML = this._figureLabel(objectid) + (meta.image_citation
          ? this.formatCitation(meta.image_citation)
          : (meta.title || 'Image citation unavailable'));
      }
      if (desktopLink)    { desktopLink.href = itemUrl; desktopLink.style.display = 'inline'; }
      if (desktopWrapper) desktopWrapper.classList.add('visible');
      if (mobileTitleEl)  mobileTitleEl.textContent = meta.title || '';
      if (mobileViewLink) { mobileViewLink.href = itemUrl; mobileViewLink.style.display = 'inline'; }
    } else {
      if (desktopContent) desktopContent.innerHTML = '';
      if (desktopLink)    desktopLink.style.display = 'none';
      if (desktopWrapper) desktopWrapper.classList.remove('visible');
      if (mobileTitleEl)  mobileTitleEl.textContent = '';
      if (mobileViewLink) mobileViewLink.style.display = 'none';
    }
  }

  // ── LAYOUT OBSERVERS ────────────────────────────────────────────────────

  setupLayoutObserver() {
    this.layoutObserverPaused = false;

    this.layoutObserver = new IntersectionObserver((entries) => {
      if (this.layoutObserverPaused) return;
      if (this.layoutObserverTimeout) clearTimeout(this.layoutObserverTimeout);

      this.layoutObserverTimeout = setTimeout(() => {
        if (this.isTransitioning || this.isRestoring) return;

        const viewportCenter = window.innerHeight / 2;
        let closestBlock = null, minDistance = Infinity;

        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          const rect        = entry.target.getBoundingClientRect();
          const blockCenter = rect.top + rect.height / 2;
          const distance    = Math.abs(viewportCenter - blockCenter);
          if (distance < minDistance) { minDistance = distance; closestBlock = entry.target; }
        }

        if (closestBlock) {
          const block        = closestBlock;
          const targetLayout = block.dataset.layout;

          if (block.dataset.chapterPath) {
            const chapterIndex = this.allEssays.findIndex(essay =>
              this.normalizeUrl(essay.url) === this.normalizeUrl(block.dataset.chapterPath)
            );
            if (chapterIndex !== -1 && chapterIndex !== this.activeChapterIndex) {
              this.activeChapterIndex = chapterIndex;
              this.updateHeaderForChapter(chapterIndex);
              this.updateTocActiveChapter(chapterIndex);
            }
          }

          // inter_vis stays in layout-right — skip transition for inter_vis targets
          if (targetLayout && targetLayout !== this.currentLayout &&
              !this.isTransitioning && targetLayout !== 'inter_vis') {
            this.applyLayoutTransition(targetLayout);
          }

          this.updateHistory(block);
        }
      }, 75);
    }, { rootMargin: '-35% 0px -15% 0px', threshold: 0 });

    this.separatorForwardObserver = new IntersectionObserver((entries) => {
      if (this.layoutObserverPaused || this.isTransitioning ||
          this.scrollAdjustmentCooldown || this.isRestoring) return;

      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const separator = entry.target.closest('.chapter-separator');
        if (!separator) return;
        const nextBlock = separator.nextElementSibling;
        if (!nextBlock || !nextBlock.classList.contains('chapter-content-block')) return;

        const targetLayout = nextBlock.dataset.layout;

        if (nextBlock.dataset.chapterPath) {
          const nextIdx = this.allEssays.findIndex(e =>
            this.normalizeUrl(e.url) === this.normalizeUrl(nextBlock.dataset.chapterPath)
          );
          if (nextIdx !== -1 && nextIdx !== this.activeChapterIndex) {
            this.activeChapterIndex = nextIdx;
            this.updateHeaderForChapter(nextIdx);
            this.updateTocActiveChapter(nextIdx);
          }
        }

        if (targetLayout && targetLayout !== this.currentLayout && targetLayout !== 'inter_vis') {
          this.applyLayoutTransition(targetLayout);
        }
      });
    }, { rootMargin: '0px 0px -98% 0px', threshold: 0 });

    this.separatorBackwardObserver = new IntersectionObserver((entries) => {
      if (this.layoutObserverPaused || this.isTransitioning ||
          this.scrollAdjustmentCooldown || this.isRestoring) return;

      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const separator = entry.target.closest('.chapter-separator');
        if (!separator) return;
        const prevBlock = separator.previousElementSibling;
        if (!prevBlock || !prevBlock.classList.contains('chapter-content-block')) return;

        const targetLayout = prevBlock.dataset.layout;

        if (prevBlock.dataset.chapterPath) {
          const prevIdx = this.allEssays.findIndex(e =>
            this.normalizeUrl(e.url) === this.normalizeUrl(prevBlock.dataset.chapterPath)
          );
          if (prevIdx !== -1 && prevIdx !== this.activeChapterIndex) {
            this.activeChapterIndex = prevIdx;
            this.updateHeaderForChapter(prevIdx);
            this.updateTocActiveChapter(prevIdx);
          }
        }

        if (targetLayout && targetLayout !== this.currentLayout && targetLayout !== 'inter_vis') {
          this.applyLayoutTransition(targetLayout);
        }
      });
    }, { rootMargin: '-98% 0px 0px 0px', threshold: 0 });
  }

  // ── LAYOUT TRANSITIONS (preserve version — full/non-full only) ───────────

  applyLayoutTransition(newLayout) {
    if (this.isRestoring) return Promise.resolve();
    if (this.currentLayout === newLayout && !this.isTransitioning) return Promise.resolve();

    if (this.isTransitioning) {
      if (this.pendingLayout !== newLayout) this.pendingLayout = newLayout;
      return this.transitionPromise || Promise.resolve();
    }

    this.isTransitioning  = true;
    this.currentLayout    = newLayout;
    this.scrollyContainer.dataset.layout = newLayout;

    this.transitionPromise = this._performLayoutTransition(newLayout)
      .finally(() => {
        this.isTransitioning   = false;
        this.transitionPromise = null;
        if (this.pendingLayout && this.pendingLayout !== this.currentLayout) {
          const nextLayout = this.pendingLayout; this.pendingLayout = null;
          setTimeout(() => this.applyLayoutTransition(nextLayout), 50);
        }
      });

    return this.transitionPromise;
  }

  _getCurtain() {
    let curtain = document.getElementById('scrolly-transition-curtain');
    if (!curtain) {
      curtain = document.createElement('div');
      curtain.id = 'scrolly-transition-curtain';
      Object.assign(curtain.style, {
        position: 'fixed', inset: '0',
        background: 'var(--scrolly-bg-color, #111111)',
        zIndex: '9998', opacity: '0', pointerEvents: 'none', transition: 'opacity 0s'
      });
      document.body.appendChild(curtain);
    }
    return curtain;
  }

  async _curtainDown(ms = 0) {
    const c = this._getCurtain();
    c.style.transition = `opacity ${ms}ms ease`; c.style.opacity = '1'; c.style.pointerEvents = 'all';
    if (ms > 0) await this._wait(ms);
  }

  async _curtainUp(ms = 300) {
    const c = this._getCurtain();
    c.style.transition = `opacity ${ms}ms ease`; c.style.opacity = '0'; c.style.pointerEvents = 'none';
    await this._wait(ms);
  }

  async _performLayoutTransition(newLayout) {
    try {
      this.layoutObserverPaused = true;
      const imageCol    = document.getElementById('scrolly-image');
      const leavingFull = this.scrollyContainer.classList.contains('layout-full') ||
                          this.scrollyContainer.dataset.layout === 'full';
      const enteringFull = newLayout === 'full';

      await this._curtainDown(0);

      this.currentCitation = null;
      if (this.citationDisplayEl) {
        this.citationDisplayEl.classList.remove('visible');
        this.citationDisplayEl.innerHTML = '';
      }
      this.chapterEndFaded = false;

      if (enteringFull) {
        if (imageCol) { imageCol.style.transition = 'none'; imageCol.style.opacity = '0'; }
        this.scrollyContainer.className = `scrolly-container layout-${newLayout}`;
        void this.scrollyContainer.offsetWidth;

        document.querySelectorAll('.chapter-content-block[data-layout="full"]')
          .forEach(block => this.hydrateInlineImages(block));

        this.imageContainer.querySelectorAll('img').forEach(img => {
          img.style.opacity = '0'; img.style.visibility = 'hidden';
        });
        this.activeFullLayoutImageId = null; this.currentCitation = null;

        await this._wait(500); await this._curtainUp(350);

      } else if (leavingFull) {
        if (imageCol) { imageCol.style.transition = 'none'; imageCol.style.opacity = '0'; }

        const scrollBefore = window.scrollY;
        const heightBefore = document.documentElement.scrollHeight;

        this.scrollyContainer.className = `scrolly-container layout-${newLayout}`;
        void this.scrollyContainer.offsetWidth;

        const heightDelta = document.documentElement.scrollHeight - heightBefore;
        if (heightDelta > 0) {
          this.scrollAdjustmentCooldown = true;
          window.scrollTo(0, scrollBefore + heightDelta);
        }

        this.imageContainer.querySelectorAll('img').forEach(img => {
          img.style.visibility = 'visible';
        });
        this.activeImageId = null; this.activeFullLayoutImageId = null;
        this.currentCitation = null; this.updateFooterImageCitation(null);

        await this._wait(16); await this._curtainUp(280);

      } else {
        this.scrollyContainer.className = `scrolly-container layout-${newLayout}`;
        void this.scrollyContainer.offsetWidth;
        await this._wait(16); await this._curtainUp(280);
      }

      if (!enteringFull && imageCol) {
        imageCol.style.transition = 'opacity 0.35s ease'; imageCol.style.opacity = '1';
        await this._wait(350);
      }

      if (leavingFull) this.scrollAdjustmentCooldown = false;
      this.layoutObserverPaused = false;

    } catch (error) {
      console.error('Layout transition failed:', error);
      this.layoutObserverPaused = false; this.scrollAdjustmentCooldown = false;
      await this._curtainUp(150);
    }
  }

  // ── TRIGGER PARSING / ANIMATION ─────────────────────────────────────────

  parseTriggers(container, layout) {
    const rawTriggers = [];

    container.querySelectorAll('[data-trigger-type]').forEach(marker => {
      if (!marker.dataset.scrollyProcessed) {
        const t = {
          element: marker, parentLayout: layout,
          type: marker.dataset.triggerType, id: marker.dataset.triggerId,
          action: marker.dataset.triggerAction,
          params: {
            zoom: marker.dataset.triggerZoom ? parseFloat(marker.dataset.triggerZoom) : 10,
            coordinates: marker.dataset.triggerCoordinates || null
          }
        };
        this.triggers.push(t); rawTriggers.push(t);
        marker.dataset.scrollyProcessed = 'true';
      }
    });

    const pendingStarts = {};
    rawTriggers.forEach(t => {
      if (t.type !== 'image' || t.parentLayout === 'full') return;
      if (t.action === 'start') pendingStarts[t.id] = t;
      else if (t.action === 'end' && pendingStarts[t.id]) {
        this.imageSegments.push({ id: t.id, start: pendingStarts[t.id], end: t });
      }
    });
  }

  renderAnimations(viewportCenter) {
    if (this.currentLayout === 'full') return;

    this.imageSegments.forEach(segment => {
      if (segment.id !== this.activeImageId) return;

      const sRect  = segment.start.element.getBoundingClientRect();
      const eRect  = segment.end.element.getBoundingClientRect();
      const startY = sRect.top + sRect.height / 2;
      const endY   = eRect.top + eRect.height / 2;

      if (startY < viewportCenter && endY > viewportCenter) {
        const progress = (viewportCenter - startY) / (endY - startY);
        const sP = this.getNumericParams(segment.start);
        const eP = this.getNumericParams(segment.end);

        const img = this.imageContainer.querySelector(`img[data-objectid="${segment.id}"]`);
        if (img) this.applyTransformToImage(img,
          this.lerp(sP.zoom, eP.zoom, progress),
          this.lerp(sP.x,    eP.x,    progress),
          this.lerp(sP.y,    eP.y,    progress)
        );
      }
    });
  }

  applyTransformToImage(img, zoom, x, y) {
    img.style.transformOrigin = `${x || 50}% ${y || 50}%`;
    img.style.transform       = `scale(${zoom / 10})`;
  }

  lerp(start, end, t) { return start * (1 - t) + end * t; }

  getNumericParams(trigger) {
    let x = 50, y = 50;
    if (trigger.params.coordinates) {
      const parts = trigger.params.coordinates.split(',').map(Number);
      x = (parts[0] / 1000) * 100; y = (parts[1] / 1000) * 100;
    }
    return { zoom: trigger.params.zoom || 10, x, y };
  }

  // ── CITATIONS ───────────────────────────────────────────────────────────

  handleCitations(triggerThreshold) {
    const activeEssay = this.allEssays[this.activeChapterIndex];
    if (activeEssay?.layout === 'inter_vis') return;

    let active = null;
    this.footnotes.forEach(f => {
      if (f.element.getBoundingClientRect().top <= triggerThreshold) active = f;
    });
    if (active && this.currentCitation !== active.citationId) {
      const citation = window.citationData[active.citationId];
      if (citation) {
        const formattedText = this.formatCitation(citation.text);
        if (this.citationDisplayEl) {
          this.citationDisplayEl.innerHTML =
            `<span class="citation-number">${active.number}</span>` +
            `<span class="bib-citation-text">${formattedText}</span>`;
          this.truncateCitationUrls();
          this.citationDisplayEl.classList.add('visible');
        }
        this.currentCitation = active.citationId;
      }
    }
  }

  truncateCitationUrls() {
    if (!this.citationDisplayEl) return;
    const citationText = this.citationDisplayEl.querySelector('.bib-citation-text');
    if (!citationText) return;
    const urlPattern = /(\[?)https?:\/\/[^\s\]<>"']+[\.\/\w:]*(\]?)?/gi;
    if (urlPattern.test(citationText.innerHTML)) {
      citationText.innerHTML = citationText.innerHTML.replace(urlPattern,
        (match, openBracket, closeBracket) => {
          const hasBrackets = openBracket === '[' || closeBracket === ']';
          return hasBrackets
            ? `[<span class="citation-url-continuation">(cont.)</span>]`
            : `<span class="citation-url-continuation">(cont.)</span>`;
        }
      );
    }
  }

  formatCitation(text) {
    return text
      .replace(/_(.*?)_/g, '<i>$1</i>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  }

  // ── SEPARATOR FADE ───────────────────────────────────────────────────────

  handleSeparatorFade(triggerThreshold) {
    if (this.currentLayout === 'full') return;
    const activeEssay = this.allEssays[this.activeChapterIndex];
    if (activeEssay?.layout === 'inter_vis') {
      // While inside an inter_vis section, ensure the image column is fully
      // opaque. The chapter separator fade (before the inter_vis) may have
      // lowered imageCol.opacity; if we leave it reduced, the inter_vis frame
      // (which lives inside the image column) will also appear dimmed.
      const imageCol = document.getElementById('scrolly-image');
      if (imageCol && parseFloat(imageCol.style.opacity || '1') < 1) {
        imageCol.style.transition = 'opacity 0.4s ease';
        imageCol.style.opacity    = '1';
      }
      return;
    }

    for (const icon of this.separatorIcons) {
      const iconRect = icon.getBoundingClientRect();
      const imageCol = document.getElementById('scrolly-image');
      if (!imageCol) continue;

      if (iconRect.top < 0) {
        imageCol.style.transition = 'opacity 0.3s ease'; imageCol.style.opacity = '1'; continue;
      }
      if (iconRect.top >= 0 && iconRect.top <= window.innerHeight) {
        const progress = 1 - (iconRect.top / window.innerHeight);
        const fade = progress > 0.4 ? Math.max(0.15, 1 - ((progress - 0.4) / 0.6) * 0.85) : 1;
        imageCol.style.transition = 'opacity 0.1s linear'; imageCol.style.opacity = fade.toFixed(3);
      } else if (iconRect.top > window.innerHeight) {
        imageCol.style.transition = 'opacity 0.2s ease'; imageCol.style.opacity = '1';
      }
    }

    let inGap = false;
    for (const icon of this.separatorIcons) {
      const iconRect   = icon.getBoundingClientRect();
      const iconCentre = iconRect.top + iconRect.height / 2;
      if (iconCentre >= triggerThreshold) continue;

      const separator = icon.closest('.chapter-separator');
      if (!separator) continue;
      const nextBlock = separator.nextElementSibling;
      if (!nextBlock || !nextBlock.classList.contains('chapter-content-block')) continue;
      if (nextBlock.getBoundingClientRect().top >= triggerThreshold) { inGap = true; break; }
    }

    if (inGap === this.chapterEndFaded) return;
    this.chapterEndFaded = inGap;

    if (inGap) {
      if (this.citationDisplayEl) {
        this.citationDisplayEl.style.transition = 'none';
        this.citationDisplayEl.classList.remove('visible');
      }
    } else {
      this.currentCitation = null;
      if (this.citationDisplayEl) this.citationDisplayEl.classList.remove('visible');
    }
  }

  // ── FOOTNOTES ───────────────────────────────────────────────────────────

  convertFootnotesToSuperscript(container) {
    container.querySelectorAll('p').forEach(p => {
      if (!p.querySelector('sup[id^="fnref:"]')) {
        p.innerHTML = p.innerHTML.replace(/\^(\d+)/g,
          (match, num) => `<sup id="fnref:${num}" class="footnote-ref">${num}</sup>`);
      }
    });
  }

  processFootnotes(container) {
    container.querySelectorAll('sup[id^="fnref:"]').forEach(sup => {
      const rawNum = sup.textContent.trim();
      const id     = `citation_${rawNum.padStart(3, '0')}`;
      if (!window.citationData[id]) return;
      const marker = document.createElement('span');
      marker.className = 'footnote-trigger-marker';
      marker.dataset.citationId = id;
      sup.parentNode.insertBefore(marker, sup);
      this.footnotes.push({ element: marker, citationId: id, number: rawNum });
    });
  }

  // ── INFINITE SCROLL / CHAPTER LOADING ───────────────────────────────────

  async loadChapter(direction) {
    if (this.isLoading) return;
    this.isLoading = true;

    const isNext    = direction === 'next';
    const targetIdx = isNext ? this.loadedRange.end + 1 : this.loadedRange.start - 1;

    if (targetIdx < 0 || targetIdx >= this.allEssays.length) {
      this.isLoading = false; return;
    }

    const targetChapter = this.allEssays[targetIdx];
    const normalizedUrl = this.normalizeUrl(targetChapter.url);

    const existingBlocks = document.querySelectorAll(`[data-chapter-path="${normalizedUrl}"]`);
    if (existingBlocks.length > 0) {
      if (existingBlocks.length > 1) {
        for (let i = 1; i < existingBlocks.length; i++) {
          const dup  = existingBlocks[i];
          const prev = dup.previousElementSibling;
          if (prev && prev.classList.contains('chapter-separator')) prev.remove();
          dup.remove();
        }
      }
      if (isNext  && targetIdx > this.loadedRange.end)   this.loadedRange.end   = targetIdx;
      if (!isNext && targetIdx < this.loadedRange.start) this.loadedRange.start = targetIdx;
      this.isLoading = false; return;
    }

    try {
      const resp   = await fetch(targetChapter.url);
      const html   = await resp.text();
      const doc    = new DOMParser().parseFromString(html, 'text/html');
      const source = doc.querySelector('.scrolly-text-content');

      if (source) {
        const newBlock = document.createElement('div');
        newBlock.className           = 'scrolly-text-content chapter-content-block';
        newBlock.dataset.chapterPath = normalizedUrl;
        newBlock.dataset.layout      = source.dataset.layout || 'right';

        // ── CRITICAL: preserve intervis-trigger-block class for inter_vis sections.
        // The CSS rule '.intervis-trigger-block [data-trigger-type] { height: 65vh }'
        // requires this class. Without it, trigger markers inherit the global rule
        // '[data-trigger-type] { height: 0 }', the block collapses to padding-only
        // height (~65vh), all triggers fire simultaneously on entry, and
        // _clearAllLayers() fires before the 2s opacity transition can render
        // anything. The hint/title still appear (position:fixed, .is-active driven)
        // which is why the right column looks correct but the left does not.
        if (newBlock.dataset.layout === 'inter_vis') {
          newBlock.classList.add('intervis-trigger-block');
        }

        if (source.dataset.tocTitle)     newBlock.dataset.tocTitle     = source.dataset.tocTitle;
        if (source.dataset.chapterTitle) newBlock.dataset.chapterTitle = source.dataset.chapterTitle;
        if (source.dataset.intervisAlt)  newBlock.dataset.intervisAlt  = source.dataset.intervisAlt;
        newBlock.innerHTML = source.innerHTML;

        const newLayout    = newBlock.dataset.layout;
        let adjacentLayout = null;

        if (isNext) {
          const blocks = document.querySelectorAll('.chapter-content-block');
          adjacentLayout = blocks[blocks.length - 1]?.dataset.layout || null;
        } else {
          adjacentLayout = document.querySelector('.chapter-content-block')?.dataset.layout || null;
        }

        // ── Separator strategy ─────────────────────────────────────────────
        //
        // Chapter → inter_vis: use the FULL chapter separator (90vh, icon).
        //   The 90vh gap gives separatorForwardObserver and separatorBackward-
        //   Observer enough temporal separation to fire cleanly without the
        //   rapid oscillation that caused the URL flicker. A 5vh invisible
        //   separator fires both observers almost simultaneously, alternating
        //   activeChapterIndex between chapter and inter_vis.
        //
        // Inter_vis → chapter: use NO separator at all. With no element to
        //   observe, the separator observers never fire for this transition;
        //   only the layoutObserver handles it via geometric center distance.
        //   This also eliminates backward-scroll observer confusion.
        //
        // Everything else: existing large/normal separator logic.
        let newSeparator;
        if (newLayout === 'inter_vis') {
          // Full chapter icon separator before every inter_vis section
          newSeparator = this.createChapterSeparator(false, false);
        } else if (adjacentLayout === 'inter_vis') {
          // No separator after inter_vis — layoutObserver handles the transition
          newSeparator = null;
        } else {
          const needsLargeSep = newLayout === 'full' || adjacentLayout === 'full';
          newSeparator = this.createChapterSeparator(needsLargeSep, newLayout === 'full');
        }

        if (isNext) {
          if (newSeparator) this.textColumn.insertBefore(newSeparator, this.loadingIndicatorEl);
          this.textColumn.insertBefore(newBlock, this.loadingIndicatorEl);
          this.loadedRange.end++;
          this.processNewBlock(newBlock);
          if (newSeparator) this.observeSeparator(newSeparator);

          if (newLayout === 'inter_vis' && !this.isRestoring) {
            // ── INTER_VIS INFINITE SCROLL FIX ──────────────────────────────
            // The browser has not yet reflowed after inserting the trigger
            // block, so scrollHeight is stale. Block handleInfiniteScroll for
            // 400ms so the browser can reflow, then re-evaluate scroll position.
            this.scrollAdjustmentCooldown = true;
            setTimeout(() => {
              this.scrollAdjustmentCooldown = false;
              this.handleScroll();
            }, 400);
          }

        } else {
          const scrollYBefore   = window.scrollY;
          const docHeightBefore = document.documentElement.scrollHeight;

          this.layoutObserverPaused = true;
          if (newSeparator) this.textColumn.prepend(newSeparator);
          this.textColumn.prepend(newBlock);
          this.loadedRange.start--;
          this.processNewBlock(newBlock);
          if (newSeparator) this.observeSeparator(newSeparator);

          if (!this.isRestoring) {
            this.scrollAdjustmentCooldown = true;
            await this._wait(100);
            const addedHeight = document.documentElement.scrollHeight - docHeightBefore;
            window.scrollTo(0, scrollYBefore + addedHeight);
            await this._wait(500);
            this.scrollAdjustmentCooldown = false;
          }

          this.layoutObserverPaused = false;
        }
      }
    } catch (e) {
      console.error('Failed to load chapter:', e);
    } finally {
      this.isLoading = false;
    }
  }

  handleInfiniteScroll() {
    if (this.isLoading || this.isTransitioning ||
        this.scrollAdjustmentCooldown || this.isRestoring) return;

    const currentY = window.scrollY;
    if (Math.abs(currentY - this.lastScrollY) < 10) return;
    this.lastScrollY = currentY;

    let bottomThreshold = 2000, topThreshold = 1000;

    if (this.loadedRange.end < this.allEssays.length - 1) {
      const nextChapter = this.allEssays[this.loadedRange.end + 1];
      const currentLast = Array.from(document.querySelectorAll('.chapter-content-block')).pop();
      const nextBlock   = document.querySelector(
        `[data-chapter-path="${this.normalizeUrl(nextChapter.url)}"]`
      );
      // Raise threshold if current or next is a full-layout or inter_vis section
      // (inter_vis sections have many 65vh trigger blocks so they need more runway)
      const noImageLayout = (currentLast && (
          currentLast.dataset.layout === 'full' ||
          currentLast.dataset.layout === 'inter_vis'
        )) || (nextBlock && (
          nextBlock.dataset.layout === 'full' ||
          nextBlock.dataset.layout === 'inter_vis'
        ));
      if (noImageLayout) bottomThreshold = 3500;
    }

    if (this.loadedRange.start > 0) {
      const firstBlock = document.querySelector('.chapter-content-block');
      if (firstBlock && (firstBlock.dataset.layout === 'full' ||
                         firstBlock.dataset.layout === 'inter_vis')) {
        topThreshold = 2000;
      }
    }

    const scrollBottom = window.scrollY + window.innerHeight;

    if (document.documentElement.scrollHeight - scrollBottom < bottomThreshold &&
        this.loadedRange.end < this.allEssays.length - 1) {
      this.loadChapter('next');
    } else if (window.scrollY < topThreshold && this.loadedRange.start > 0 &&
               this.maxScrollY > topThreshold * 2) {
      this.loadChapter('prev');
    }
  }

  // ── UTILITIES ────────────────────────────────────────────────────────────

  createChapterSeparator(isLarge = false, isBeforeFullLayout = false) {
    const sep = document.createElement('div');
    if (isBeforeFullLayout) {
      sep.className = 'chapter-separator large full-layout-separator';
      sep.style.marginBottom = '80vh'; sep.style.paddingTop = '25vh';
    } else if (isLarge) {
      sep.className = 'chapter-separator large';
    } else {
      sep.className = 'chapter-separator';
    }
    sep.innerHTML = `<img src="{{ '/assets/objects/chapter_icon.png' | relative_url }}" alt="chapter divider" style="width:40px;">`;
    return sep;
  }

  // 5vh separator with 1px invisible anchor for separator observers
  createIntervisSeparator() {
    const sep = document.createElement('div');
    sep.className = 'chapter-separator intervis-separator';
    sep.innerHTML = `<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="" aria-hidden="true">`;
    return sep;
  }

  createImageElement(objectid, params) {
    const meta = window.collectionMetadata[objectid]; if (!meta) return;
    const img  = document.createElement('img');
    img.dataset.objectid = objectid;
    img.src = meta.object_location || meta.image_small;
    img.className = 'scrolly-sticky-img';
    Object.assign(img.style, {
      position: 'absolute', top: '0', left: '0',
      width: '100%', height: '100%',
      objectFit: 'contain', opacity: '0',
      transition: 'opacity 0.6s ease-in-out', zIndex: '1'
    });
    if (params) this.applyTransformToImage(img, params.zoom, params.x, params.y);
    this.imageContainer.appendChild(img);
  }

  normalizeUrl(url) {
    if (!url) return '';
    const path = url.replace(window.location.origin, '').replace(/\/+$/, '');
    return path === '' ? '/' : path;
  }

  _wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

  observeBlock(element) {
    if (this.layoutObserver && element && !element.classList.contains('chapter-separator')) {
      this.layoutObserver.observe(element);
    }
  }

  observeSeparator(separator) {
    if (!separator || !separator.classList.contains('chapter-separator')) return;
    const icon = separator.querySelector('img'); if (!icon) return;
    if (this.separatorForwardObserver)  this.separatorForwardObserver.observe(icon);
    if (this.separatorBackwardObserver) this.separatorBackwardObserver.observe(icon);
    if (!this.separatorIcons.includes(icon)) this.separatorIcons.push(icon);
  }

  updateHistory(block) {
    const path = block.dataset.chapterPath;
    if (path && window.location.pathname !== this.normalizeUrl(path)) {
      history.replaceState({}, '', path);
    }
  }

  updateHeaderForChapter(idx) {
    const essay = this.allEssays[idx]; if (!essay) return;

    if (typeof updateChapterDisplay === 'function') {
      updateChapterDisplay({
        chapter:     essay.chapter     || null,
        title:       essay.title       || '',
        toc_title:   essay.toc_title   || essay.title || '',
        chap_number: essay.chap_number || null,
        order:       essay.order       || idx + 1,
        layout:      essay.layout      || 'right'
      });
    }

    const block = document.querySelector(
      `[data-chapter-path="${this.normalizeUrl(essay.url)}"]`
    );
    if (block) this.updateHistory(block);
  }

  setupThemeObserver() {
    new MutationObserver(() => this.updateTheme())
      .observe(document.body, { attributes: true, attributeFilter: ['class'] });
  }

  updateTheme() {
    const isLight = document.body.classList.contains('light-mode');
    const bg = isLight ? '#ffffff' : '#111111';
    const fg = isLight ? '#1a1a1a' : '#f0f0f0';

    if (this.scrollyContainer) {
      this.scrollyContainer.style.backgroundColor = bg;
      this.scrollyContainer.style.color           = fg;
    }
    if (this.imageContainer) this.imageContainer.style.backgroundColor = bg;
    if (this.citationColumnEl) this.citationColumnEl.style.backgroundColor = bg;

    const toc = document.getElementById('scrolly-toc-sidebar');
    if (toc) {
      toc.style.backgroundColor  = bg;
      toc.style.borderRightColor = isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
    }

    const citationDesktop = document.getElementById('scrolly-image-citation-footer');
    if (citationDesktop) {
      citationDesktop.style.backgroundColor = bg;
      citationDesktop.style.color = isLight ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.5)';
    }

    document.querySelectorAll('.scrolly-text-content hr').forEach(hr => {
      hr.style.borderTopColor = isLight ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.2)';
    });
  }

  _suppressBackToTop() {
    const hide = () => {
      const el = document.getElementById('scroll-to-top');
      if (el) {
        el.style.setProperty('display',        'none',   'important');
        el.style.setProperty('visibility',     'hidden', 'important');
        el.style.setProperty('pointer-events', 'none',   'important');
        el.setAttribute('aria-hidden', 'true');
      }
    };
    hide();
    const originalOnscroll = window.onscroll;
    window.onscroll = function (e) {
      if (originalOnscroll) {
        const src = originalOnscroll.toString();
        if (!src.includes('scroll-to-top')) originalOnscroll.call(this, e);
      }
      hide();
    };
    const el = document.getElementById('scroll-to-top');
    if (el) new MutationObserver(hide).observe(el, { attributes: true, attributeFilter: ['style', 'class'] });
  }

  // ── LIGHTBOX ─────────────────────────────────────────────────────────────

  setupLightbox() {
    if (!document.getElementById('scrolly-lightbox')) {
      const overlay = document.createElement('div');
      overlay.id = 'scrolly-lightbox';
      overlay.setAttribute('role', 'dialog'); overlay.setAttribute('aria-modal', 'true');
      overlay.setAttribute('aria-label', 'Image lightbox');

      const closeBtn = document.createElement('button');
      closeBtn.id = 'scrolly-lightbox-close'; closeBtn.textContent = '×';
      closeBtn.setAttribute('aria-label', 'Close lightbox');

      const img = document.createElement('img'); img.id = 'scrolly-lightbox-img'; img.alt = '';
      const caption = document.createElement('div'); caption.id = 'scrolly-lightbox-caption';

      overlay.appendChild(closeBtn); overlay.appendChild(img); overlay.appendChild(caption);
      document.body.appendChild(overlay);

      overlay.addEventListener('click', (e) => { if (e.target === overlay) this.closeLightbox(); });
      closeBtn.addEventListener('click', () => this.closeLightbox());
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          e.preventDefault(); this.closeLightbox();
        }
      });
    }

    if (this.imageContainer && !this.imageContainer.dataset.lightboxWired) {
      this.imageContainer.addEventListener('click', (e) => {
        if (this.currentLayout === 'full') return;
        const img = e.target.closest('img');
        // Do not open lightbox for inter_vis visualization layers
        if (!img || img.classList.contains('intervis-layer')) return;
        const meta = img.dataset.objectid ? window.collectionMetadata[img.dataset.objectid] : null;
        const captionText = meta ? this.formatCitation(meta.image_citation || meta.title || '') : '';
        this.openLightbox(img.src, captionText);
      });
      this.imageContainer.dataset.lightboxWired = 'true';
    }

    this._wireLightboxOnInlineImages();
  }

  _wireLightboxOnInlineImages() {
    document.querySelectorAll(
      '.chapter-content-block[data-layout="full"] [data-trigger-type="image"] img'
    ).forEach(img => {
      if (img.dataset.lightboxReady) return;
      img.dataset.lightboxReady = 'true';
      img.addEventListener('click', () => {
        const trigger = img.closest('[data-trigger-type="image"]');
        const objId   = trigger ? trigger.dataset.triggerId : null;
        const meta    = objId ? window.collectionMetadata[objId] : null;
        const caption = meta ? this.formatCitation(meta.image_citation || meta.title || '') : '';
        this.openLightbox(img.src, caption);
      });
    });
  }

  openLightbox(src, caption) {
    const overlay   = document.getElementById('scrolly-lightbox');
    const imgEl     = document.getElementById('scrolly-lightbox-img');
    const captionEl = document.getElementById('scrolly-lightbox-caption');
    if (!overlay || !imgEl) return;
    imgEl.src = src; captionEl.innerHTML = caption || '';
    overlay.classList.add('active'); document.body.style.overflow = 'hidden';
    this.truncateCitationUrlsForLightbox(); this._wireLightboxOnInlineImages();
  }

  truncateCitationUrlsForLightbox() {
    const captionEl = document.getElementById('scrolly-lightbox-caption'); if (!captionEl) return;
    const urlPattern = /(\[?)https?:\/\/[^\s\]<>"']+[\.\/\w:]*(\]?)?/gi;
    if (urlPattern.test(captionEl.innerHTML)) {
      captionEl.innerHTML = captionEl.innerHTML.replace(urlPattern,
        (match, openBracket, closeBracket) => {
          const hasBrackets = openBracket === '[' || closeBracket === ']';
          return hasBrackets
            ? `[<span class="citation-url-continuation">(cont.)</span>]`
            : `<span class="citation-url-continuation">(cont.)</span>`;
        }
      );
    }
  }

  closeLightbox() {
    const overlay = document.getElementById('scrolly-lightbox'); if (!overlay) return;
    overlay.classList.remove('active'); document.body.style.overflow = '';
    setTimeout(() => {
      const imgEl = document.getElementById('scrolly-lightbox-img');
      if (imgEl && !overlay.classList.contains('active')) imgEl.src = '';
    }, 300);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (document.getElementById('scrolly-container')) {
    window.scrolly = new ScrollyTelling();
  }
});
</script>
