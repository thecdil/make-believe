<style>
/* ═══════════════════════════════════════════════════════════════════
   SCROLLYTELLING FOOTER
   Desktop : [←]  [→]
   Mobile  : [←] [image title – View Item] [→]

   Every body.light-mode rule is paired with html.light-mode so the
   pre-paint class set by the header script applies immediately.
   ═══════════════════════════════════════════════════════════════════ */

.scrolly-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 999;
  height: 2.8rem;
  background-color: rgba(17, 17, 17, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.25rem;
  gap: 0.75rem;
  transition: background-color 0.3s ease, border-color 0.3s ease;
}
html.light-mode .scrolly-footer,
body.light-mode .scrolly-footer {
  background-color: rgba(255, 255, 255, 0.95);
  border-top-color: rgba(0, 0, 0, 0.1);
}

/* ── Nav links (prev / next) ─────────────────────────────────────── */
.scrolly-footer-nav {
  display:     flex;
  align-items: center;
  text-decoration: none;
  color:       #CACACA;
  font-size:   0.8em;
  cursor:      pointer;
  transition:  color 0.15s ease, opacity 0.15s ease;
  line-height: 1.3;
  flex-shrink: 0;
}
.scrolly-footer-nav:hover { color: #FFFFFF; }
.scrolly-footer-nav[disabled] {
  opacity: 0.25;
  pointer-events: none;
}
html.light-mode .scrolly-footer-nav,
body.light-mode .scrolly-footer-nav       { color: #353535; }
html.light-mode .scrolly-footer-nav:hover,
body.light-mode .scrolly-footer-nav:hover { color: #000000; }

.scrolly-footer-arrow {
  font-size:   1.25em;
  flex-shrink: 0;
  line-height: 1;
}

/* ── Center zone — image citation on mobile ──────────────────────── */
.scrolly-footer-center {
  flex:            1 1 auto;
  display:         none;
  align-items:     center;
  justify-content: center;
  min-width:       0;
  gap:             0.35rem;
  font-size:       0.78em;
  color:           #CACACA;
  overflow:        hidden;
}
html.light-mode .scrolly-footer-center,
body.light-mode .scrolly-footer-center { color: #353535; }

.scrolly-mobile-image-title {
  font-style:    italic;
  white-space:   nowrap;
  overflow:      hidden;
  text-overflow: ellipsis;
  flex-shrink:   1;
}

.scrolly-mobile-view-link {
  flex-shrink:           0;
  color:                 #8C8C8C;
  text-decoration:       underline;
  text-underline-offset: 2px;
  font-size:             0.92em;
  white-space:           nowrap;
}
html.light-mode .scrolly-mobile-view-link,
body.light-mode .scrolly-mobile-view-link { color: #737373; }

/* ── In-text footnote superscript links ─────────────────────────── */
.footnote-ref .footnote-link {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px dotted currentColor;
  padding-bottom: 1px;
  transition: color 0.15s ease, border-bottom-color 0.15s ease;
}
.footnote-ref .footnote-link:hover {
  color: var(--bs-link-color, #6ea8fe);
  border-bottom-style: solid;
}

/* ── Mobile adjustments ──────────────────────────────────────────── */
@media (max-width: 992px) {
  .scrolly-footer {
    height: auto;
    min-height: 2.8rem;
    padding: 0.4rem 0.85rem;
    align-items: stretch;
  }
  .scrolly-footer-nav {
    align-self:      center;
    flex-shrink:     0;
    width:           2.2rem;
    justify-content: center;
  }
  .scrolly-footer-center {
    display:    flex;
    align-self: center;
    white-space: normal;
    overflow:    visible;
    word-break:  break-word;
  }
}
</style>

{% assign is_essay_page = false %}
{% if page.collection == 'essay' %}
  {% assign is_essay_page = true %}
{% endif %}

<footer class="scrolly-footer" id="scrolly-footer">

  <a class="scrolly-footer-nav scrolly-footer-prev"
     id="scrolly-footer-prev"
     href="#"
     aria-label="Previous">
    <span class="scrolly-footer-arrow">❮</span>
  </a>

  <div class="scrolly-footer-center" id="scrolly-footer-center">
    <span class="scrolly-mobile-image-title" id="scrolly-mobile-image-title"></span>
    <a class="scrolly-mobile-view-link" id="scrolly-mobile-view-link" style="display:none;">— View Item</a>
  </div>

  <a class="scrolly-footer-nav scrolly-footer-next"
     id="scrolly-footer-next"
     href="#"
     aria-label="Next">
    <span class="scrolly-footer-arrow">❯</span>
  </a>

</footer>

<script>
(function () {
  'use strict';

  // ── 1. Full site navigation sequence (Liquid-generated) ────────────
  window.allNavItems = [
    { url: '{{ "/" | relative_url }}', title: 'Home' },
    {% assign sorted_essays = site.essay | sort: 'order' %}
    {% for essay in sorted_essays %}
    {
      url:     '{{ essay.url | prepend: site.baseurl }}',
      title:   {{ essay.title   | jsonify }},
      chapter: {{ essay.chapter | jsonify }},
      order:   {{ essay.order }}
    },
    {% endfor %}
    {% for nav in site.data.config-nav %}
      {% unless nav.stub == "/" or nav.stub contains "/essay/" %}
    { url: '{{ nav.stub | relative_url }}', title: {{ nav.display_name | jsonify }} },
      {% endunless %}
    {% endfor %}
  ].filter(function (item) { return item && item.url; });

  // ── 2. Item-page sequence ──────────────────────────────────────────
  window.allItemPages = [
    {% for item in site.data[site.metadata] %}
    { url: '{{ site.baseurl }}/items/{{ item.objectid }}.html', title: {{ item.title | jsonify }} },
    {% endfor %}
  ].filter(function (item) { return item && item.url; });

  // ── 3. Prev / next resolution ──────────────────────────────────────
  function normalize(url) {
    return (url || '').replace(window.location.origin, '').replace(/\/+$/, '').replace(/\.html$/, '');
  }

  var currentPath = normalize(window.location.pathname);
  var itemBase    = normalize('{{ site.baseurl }}/items/');
  var onItemPage  = currentPath.startsWith(itemBase) && currentPath.length > itemBase.length;

  var prevUrl = null;
  var nextUrl = null;

  if (onItemPage) {
    var itemIdx = window.allItemPages.findIndex(function (p) {
      return normalize(p.url) === currentPath;
    });
    if (itemIdx > 0)                                          prevUrl = window.allItemPages[itemIdx - 1].url;
    else if (itemIdx === 0)                                   prevUrl = window.allItemPages[window.allItemPages.length - 1].url;
    if (itemIdx >= 0 && itemIdx < window.allItemPages.length - 1) nextUrl = window.allItemPages[itemIdx + 1].url;
    else if (itemIdx === window.allItemPages.length - 1)          nextUrl = window.allItemPages[0].url;
  } else {
    var navIdx = window.allNavItems.findIndex(function (item) {
      return normalize(item.url) === currentPath;
    });
    if (navIdx > 0)                                          prevUrl = window.allNavItems[navIdx - 1].url;
    if (navIdx >= 0 && navIdx < window.allNavItems.length - 1) nextUrl = window.allNavItems[navIdx + 1].url;
    else if (navIdx === window.allNavItems.length - 1)          nextUrl = window.allNavItems[0].url;
  }

  // ── 4. Wire up buttons ─────────────────────────────────────────────
  var prevEl = document.getElementById('scrolly-footer-prev');
  var nextEl = document.getElementById('scrolly-footer-next');

  function applyNav(el, url) {
    if (!el) return;
    if (url) {
      el.href = url;
      el.removeAttribute('disabled');
      el.style.opacity = el.style.pointerEvents = '';
    } else {
      el.setAttribute('disabled', 'disabled');
      el.style.opacity = '0.25';
      el.style.pointerEvents = 'none';
    }
  }
  applyNav(prevEl, prevUrl);
  applyNav(nextEl, nextUrl);

  // ── 5. Keyboard navigation ─────────────────────────────────────────
  window.scrollyFooterOwnsKeyboard = true;

  document.addEventListener('keydown', function (e) {
    var tag = document.activeElement ? document.activeElement.tagName : '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (document.activeElement && document.activeElement.isContentEditable) return;
    if ((e.key === 'ArrowLeft'  || e.key === 'Left')  && prevUrl) { e.preventDefault(); window.location.href = prevUrl; }
    else if ((e.key === 'ArrowRight' || e.key === 'Right') && nextUrl) { e.preventDefault(); window.location.href = nextUrl; }
  });

  // ── 6. Light-mode sync (body class changes after toggle) ───────────
  // The initial state is already correct because html.light-mode CSS
  // rules cover the pre-paint window, and the header's DOMContentLoaded
  // migrates the class to body before any user interaction.
  document.addEventListener('DOMContentLoaded', function () {
    new MutationObserver(function () {
      var footer = document.getElementById('scrolly-footer');
      if (footer) footer.classList.toggle('light-mode', document.body.classList.contains('light-mode'));
    }).observe(document.body, { attributes: true, attributeFilter: ['class'] });
  });

}());
</script>
